<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body {
    font-family: sans-serif;
    background: #f9fafb;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.section {
    margin-top: 20px;
}

.setting {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 15px 0;
}

/* SWITCH */
.switch {
    position: relative;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #ccc;
    border-radius: 20px;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input:checked + .slider {
    background: linear-gradient(to right, #a855f7, #fb923c);
}

input:checked + .slider::before {
    transform: translateX(20px);
}

.save {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(to right, #a855f7, #fb923c);
    color: white;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Settings</h2>

    <div class="section">
        <h4>Notification Settings</h4>

        <div class="setting">
            <span>Push Notifications</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>Email Notifications</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>SMS Notifications</span>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <h4>Other Settings</h4>

        <div class="setting">
            <span>Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="darkMode">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting">
            <span>Search History</span>
            <span>></span>
        </div>

        <div class="setting">
            <span style="color:red;">Delete Account</span>
        </div>
    </div>

    <button class="save">Save Changes</button>
</div>

<script>
// Dark mode toggle
document.getElementById("darkMode").addEventListener("change", function () {
    if (this.checked) {
        document.body.style.background = "#111";
        document.body.style.color = "white";
    } else {
        document.body.style.background = "#f9fafb";
        document.body.style.color = "black";
    }
});
</script>

</body>
</html>
